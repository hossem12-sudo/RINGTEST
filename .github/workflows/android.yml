name: Flutter Android CI1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure git to use a PAT for GitHub package installs
        if: ${{ secrets.REPO_ACCESS_TOKEN != '' }}
        env:
          REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: |
          # Rewrites all https://github.com/ URLs to use https://<token>@github.com/
          # This allows non-interactive git clones by pub get.
          git config --global url."https://${REPO_ACCESS_TOKEN}:@github.com/".insteadOf "https://github.com/"

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug
